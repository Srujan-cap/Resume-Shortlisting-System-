<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screening Done</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            padding: 30px;
            background-color: #fff;
        }

        h1 {
            color: #28a745; /* Green for success */
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #4e73df;
            color: white;
            border-radius: 10px;
            padding: 10px 25px;
            margin-top: 15px;
            font-size: 16px;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }

        a.btn-link {
            display: inline-block;
            margin-top: 15px;
            color: #4e73df;
            text-decoration: none;
            font-weight: bold;
        }

        a.btn-link:hover {
            color: #2e59d9;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Screening Done<br>Data Updated</h1>

        <a href="/form" class="btn-link">Go to Home</a>

        <form action="/data" method="GET">
            <button type="submit" class="btn btn-custom">Check Data</button>
        </form>
    </div>

</body>
</html>
