<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screening</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .form-control, .form-control:focus {
            border-radius: 10px;
            box-shadow: none;
        }

        .btn-custom {
            background-color: #4e73df;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }

        h3 {
            font-weight: bold;
            color: #4e73df;
        }

        .btn-data {
            background-color: #1cc88a;
            color: white;
            border-radius: 10px;
        }

        .btn-data:hover {
            background-color: #17a673;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4">
                <div class="card-body">

                    <h3 class="text-center mb-4">Resume Screening</h3>

                    <!-- Form 1: Analyze Resume -->
                    <form action="/analyze" method="POST" enctype="multipart/form-data">

                        <!-- File Upload -->
                        <div class="mb-3">
                            <label class="form-label">Upload Resume</label>
                            <input type="file" class="form-control" name="resume" required>
                        </div>

                        <!-- Skills Input -->
                        <div class="mb-3">
                            <label class="form-label">Required Skills (comma separated)</label>
                            <textarea class="form-control" name="skills" rows="4"
                                placeholder="e.g. Python, Machine Learning, SQL" required></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-custom">Analyze Resume</button>
                        </div>

                    </form>

                    <!-- Form 2: View Stored Data -->
                    <form action="/data" method="GET">
                        <div class="d-grid">
                            <button type="submit" class="btn btn-data">Check All Resume Data</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
